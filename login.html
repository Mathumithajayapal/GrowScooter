<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SparkRide - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/jpeg" href="Images\favico.jpg">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --secondary: #00FF00;
      --text: #000000; 
      --text-light: #333333;
      --bg: #FFFFFF; 
      --bg-light: #F5F5F5; 
      --border: #DDDDDD;
      --shadow: 0 4px 12px rgba(0,255,0,0.1); 
      --shadow-lg: 0 15px 30px rgba(0,255,0,0.15);
      --transition: all 0.3s ease;
    }
    .dark-mode {
      --text: #FFFFFF; 
      --text-light: #AAAAAA;
      --bg: #111111; 
      --bg-light: #1a1a1a; 
      --border: #333333;
    }
    body {
      font-family: 'Poppins', sans-serif; 
      color: var(--text); 
      background: var(--bg);
      min-height: 100vh; 
      transition: background-color 0.3s ease, color 0.3s ease;
      display: flex; 
      align-items: center; 
      justify-content: center;
      padding: 15px;
      position: relative;
      overflow: hidden; /* Prevents scrolling */
    }
    h1, h2, h3, h4, h5, h6, .logo-text {
      font-family: 'Playfair Display', serif; 
      font-weight: 700;
    }

    /* Theme and RTL controls - positioned at top right, fixed, always visible */
    .theme-controls {
      position: fixed;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      z-index: 9999; /* Ensure it's above everything */
    }
    .theme-controls .control-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-light);
      border: 2px solid var(--secondary);
      color: var(--secondary);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .theme-controls .control-btn:hover {
      transform: scale(1.1);
      background: var(--secondary);
      color: #000000;
    }

    .login-container {
      width: 100%; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      padding-top: 25px; /* Add space for fixed buttons at top */
    }
    .login-wrapper {
      max-width: 360px; /* Optimized for 360px width */
      width: 100%;
      background: var(--bg-light); 
      border-radius: 24px; 
      overflow: hidden;
      box-shadow: var(--shadow-lg); 
      border: 1px solid var(--border);
      transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      margin: 0 auto;
    }

    /* Login Form */
    .login-form {
      padding: 20px 20px 18px; /* Slightly reduced for 360px */
      background: var(--bg-light);
      display: flex; 
      flex-direction: column;
      transition: background-color 0.3s ease;
    }
    .logo { 
      display: flex; 
      align-items: center; 
      justify-content: center;
      gap: 8px; 
      text-decoration: none; 
      margin-bottom: 8px;
    }
    .logo i { 
      color: var(--secondary); 
      font-size: 28px;
      transition: color 0.3s ease;
    }
    .logo-text {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(45deg, #00FF00, #00CC00);
      -webkit-background-clip: text; 
      background-clip: text; 
      -webkit-text-fill-color: transparent;
      transition: background 0.3s ease;
    }
    .dark-mode .logo-text {
      /* Keep the same green gradient, don't let it become white */
      background: linear-gradient(45deg, #00FF00, #00CC00);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-header { 
      margin-bottom: 12px;
      text-align: center;
    }
    .form-header h2 { 
      font-size: 1.5rem;
      color: var(--text); 
      margin-bottom: 4px;
      transition: color 0.3s ease;
    }
    .form-header p { 
      color: var(--text-light); 
      font-size: 0.8rem;
      transition: color 0.3s ease;
    }
    .form-header p a { 
      color: var(--secondary); 
      text-decoration: none; 
      font-weight: 600; 
      transition: color 0.3s ease; 
    }
    .form-header p a:hover { 
      text-decoration: underline; 
    }

    .social-login {
      display: flex; 
      gap: 6px; 
      margin-bottom: 12px;
    }
    .social-btn {
      flex: 1; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 4px;
      padding: 8px 4px;
      border: 1px solid var(--border); 
      border-radius: 10px;
      background: var(--bg); 
      color: var(--text); 
      font-weight: 500; 
      font-size: 0.75rem;
      cursor: pointer; 
      transition: background-color 0.3s ease, border-color 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    .social-btn:hover { 
      border-color: var(--secondary); 
      transform: translateY(-2px); 
      box-shadow: var(--shadow); 
    }
    .social-btn i { 
      font-size: 14px;
      color: var(--secondary); 
      transition: color 0.3s ease;
    }

    .divider {
      display: flex; 
      align-items: center; 
      gap: 6px; 
      margin: 8px 0;
      color: var(--text-light); 
      font-size: 0.7rem;
      transition: color 0.3s ease;
    }
    .divider-line { 
      flex: 1; 
      height: 1px; 
      background: var(--border); 
      transition: background-color 0.3s ease;
    }

    .input-group {
      margin-bottom: 10px;
      position: relative;
    }
    .input-icon {
      position: absolute; 
      left: 12px; 
      top: 50%; 
      transform: translateY(-50%);
      color: var(--secondary); 
      font-size: 14px;
      z-index: 2;
      transition: color 0.3s ease;
    }
    .input-field {
      width: 100%; 
      padding: 10px 10px 10px 40px;
      border: 1px solid var(--border); 
      border-radius: 10px;
      font-size: 0.8rem;
      background: var(--bg); 
      color: var(--text);
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.2s ease;
      font-family: 'Poppins', sans-serif;
    }
    .input-field:focus { 
      border-color: var(--secondary); 
      outline: none; 
      box-shadow: 0 0 0 3px rgba(0,255,0,0.1); 
    }

    .password-field { 
      position: relative; 
    }
    .password-toggle {
      position: absolute; 
      right: 12px; 
      top: 50%; 
      transform: translateY(-50%);
      background: none; 
      border: none; 
      color: var(--text-light);
      cursor: pointer; 
      font-size: 15px;
      z-index: 2;
      transition: color 0.3s ease;
    }
    .password-toggle:hover { 
      color: var(--secondary); 
    }

    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 5px 0 15px;
      width: 100%;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--secondary);
      cursor: pointer;
    }
    .remember span {
      color: var(--text-light);
      font-size: 0.75rem;
      white-space: nowrap;
    }
    .forgot-link {
      color: var(--secondary);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 600;
      transition: var(--transition);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .forgot-link:hover { text-decoration: underline; }

    .login-submit {
      width: 100%; 
      padding: 12px;
      background: var(--secondary); 
      border: none; 
      border-radius: 10px;
      color: #000000; 
      font-weight: 700; 
      font-size: 0.9rem;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 6px;
      margin-bottom: 8px;
    }
    .login-submit:hover {
      background: #00CC00; 
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,255,0,0.3);
    }
    .login-submit i { 
      transition: transform 0.3s; 
      font-size: 15px;
    }
    .login-submit:hover i { 
      transform: translateX(5px); 
    }

    .signup-prompt {
      text-align: center; 
      color: var(--text-light); 
      font-size: 0.8rem;
      margin-top: 2px;
      transition: color 0.3s ease;
    }
    .signup-prompt a { 
      color: var(--secondary); 
      text-decoration: none; 
      font-weight: 600; 
      margin-left: 4px;
      transition: color 0.3s ease;
    }
    .signup-prompt a:hover { 
      text-decoration: underline; 
    }

    /* Demo Credentials Box (added for login page) */
    .demo-creds {
      margin-top: 12px;
      margin-bottom: 8px;
      padding: 10px;
      background: rgba(0, 255, 0, 0.05);
      border-radius: 10px;
      border: 1px dashed var(--secondary);
    }
    .demo-creds p {
      color: var(--text-light);
      font-size: 0.7rem;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .demo-creds p i { color: var(--secondary); font-size: 12px; }
    .demo-badge {
      display: inline-block;
      background: var(--secondary);
      color: #000000;
      padding: 2px 6px;
      border-radius: 20px;
      font-size: 0.6rem;
      font-weight: 700;
      margin-left: 5px;
    }
    .creds-row {
      display: flex;
      gap: 12px;
      font-size: 0.7rem;
      color: var(--text-light);
    }
    .creds-row span { display: flex; align-items: center; gap: 4px; }
    .creds-row i { color: var(--secondary); font-size: 10px; }

    /* RTL */
    [dir="rtl"] .input-icon { 
      left: auto; 
      right: 12px; 
    }
    [dir="rtl"] .input-field { 
      padding: 10px 40px 10px 10px; 
    }
    [dir="rtl"] .password-toggle { 
      right: auto; 
      left: 12px; 
    }
    [dir="rtl"] .login-submit i { 
      transform: rotate(180deg); 
    }
    [dir="rtl"] .login-submit:hover i { 
      transform: rotate(180deg) translateX(5px); 
    }
    [dir="rtl"] .theme-controls {
      right: auto;
      left: 12px;
    }

    /* Desktop - No scrolling */
    @media (min-width: 1024px) {
      body {
        overflow: hidden;
        height: 100vh;
      }
      .login-wrapper {
        max-height: 95vh;
        overflow-y: auto;
      }
    }

    /* Specific optimization for 360x740 and similar small screens */
    @media (max-width: 380px) {
      body {
        padding: 8px;
      }
      .login-wrapper {
        max-width: 340px;
      }
      .login-form {
        padding: 16px 16px 14px;
      }
      .logo i {
        font-size: 26px;
      }
      .logo-text {
        font-size: 22px;
      }
      .form-header h2 {
        font-size: 1.4rem;
      }
      .social-btn {
        font-size: 0.7rem;
        padding: 7px 3px;
      }
      .social-btn i {
        font-size: 13px;
      }
      .input-field {
        padding: 9px 9px 9px 38px;
        font-size: 0.75rem;
      }
      .input-icon {
        font-size: 13px;
        left: 10px;
      }
      .password-toggle {
        font-size: 14px;
        right: 10px;
      }
      [dir="rtl"] .input-field {
        padding: 9px 38px 9px 9px;
      }
      .remember span, .forgot-link {
        font-size: 0.7rem;
      }
      .login-submit {
        padding: 11px;
        font-size: 0.85rem;
      }
      .signup-prompt {
        font-size: 0.75rem;
      }
      .demo-creds p {
        font-size: 0.65rem;
      }
      .creds-row {
        font-size: 0.65rem;
        gap: 8px;
      }
      .theme-controls {
        top: 8px;
        right: 8px;
        gap: 6px;
      }
      .theme-controls .control-btn {
        width: 36px;
        height: 36px;
        font-size: 16px;
      }
      [dir="rtl"] .theme-controls {
        right: auto;
        left: 8px;
      }
    }

    /* For very small heights (740px is fine, but ensure no overflow) */
    @media (max-height: 700px) {
      .login-form {
        padding: 15px 15px 12px;
      }
      .logo {
        margin-bottom: 5px;
      }
      .form-header {
        margin-bottom: 8px;
      }
      .social-login {
        margin-bottom: 8px;
      }
      .input-group {
        margin-bottom: 8px;
      }
      .login-options {
        margin: 3px 0 10px;
      }
      .demo-creds {
        margin-top: 8px;
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <!-- Theme and RTL controls - positioned at top right, fixed -->
  <div class="theme-controls">
    <button class="control-btn" id="themeToggle" title="Toggle dark mode">
      <i class="fas fa-moon"></i>
    </button>
    <button class="control-btn" id="rtlToggle" title="Toggle RTL">
      <i class="fas fa-exchange-alt"></i>
    </button>
  </div>

  <div class="login-container">
    <div class="login-wrapper">
      <div class="login-form">
        <a href="index.html" class="logo">
          <i class="fas fa-bolt"></i>
          <span class="logo-text">SparkRide</span>
        </a>

        <div class="form-header">
          <h2>Welcome Back</h2>
          <p>Don't have an account? <a href="signIn.html">Sign up</a></p>
        </div>

        <div class="social-login">
          <button class="social-btn"><i class="fab fa-google"></i><span>Google</span></button>
          <button class="social-btn"><i class="fab fa-facebook-f"></i><span>Facebook</span></button>
          <button class="social-btn"><i class="fab fa-apple"></i><span>Apple</span></button>
        </div>

        <div class="divider">
          <span class="divider-line"></span>
          <span>or login with email</span>
          <span class="divider-line"></span>
        </div>

        <form id="loginForm">
          <div class="input-group">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="input-field" placeholder="Email address" required value="john@SparkRide.com">
          </div>
          
          <div class="input-group password-field">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="input-field" id="password" placeholder="Password" required value="password123">
            <button type="button" class="password-toggle" id="togglePassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>

          <div class="login-options">
            <label class="remember">
              <input type="checkbox" checked>
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="login-submit">
            <span>Sign In</span>
            <i class="fas fa-arrow-right"></i>
          </button>

          
        </form>

        <div class="signup-prompt">
          New to SparkRide? <a href="signIn.html">Create account</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // Password toggle
      const togglePassword = document.getElementById('togglePassword');
      const passwordInput = document.getElementById('password');
      if (togglePassword && passwordInput) {
        togglePassword.addEventListener('click', function() {
          const type = passwordInput.type === 'password' ? 'text' : 'password';
          passwordInput.type = type;
          this.querySelector('i').classList.toggle('fa-eye-slash');
        });
      }

      // Form submission
      document.getElementById('loginForm')?.addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.querySelector('input[type="email"]').value;
        const password = document.getElementById('password').value;
        
        if (email && password) {
          alert('Welcome back to SparkRide! Redirecting to dashboard...');
        } else {
          alert('Please fill in all fields.');
        }
      });

      // Theme toggle
      function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        const themeIcon = document.querySelector('#themeToggle i');
        if (themeIcon) {
          themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      }

      // RTL toggle
      function toggleRTL() {
        const html = document.documentElement;
        const isRTL = html.getAttribute('dir') === 'rtl';
        html.setAttribute('dir', isRTL ? 'ltr' : 'rtl');
        localStorage.setItem('direction', html.getAttribute('dir'));
      }

      // Attach listeners
      document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
      document.getElementById('rtlToggle')?.addEventListener('click', toggleRTL);

      // Load saved preferences
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        const themeIcon = document.querySelector('#themeToggle i');
        if (themeIcon) themeIcon.className = 'fas fa-sun';
      }
      if (localStorage.getItem('direction') === 'rtl') {
        document.documentElement.setAttribute('dir', 'rtl');
      }

      // Social buttons placeholder
      document.querySelectorAll('.social-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          alert('Social login is not implemented. Please use the form or demo credentials.');
        });
      });

      // Forgot password placeholder
      document.querySelector('.forgot-link')?.addEventListener('click', (e) => {
        e.preventDefault();
        alert('Password reset link would be sent to your email.');
      });
    })();
  </script>
</body>
</html>
